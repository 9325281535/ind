name: Deploy to GCP

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.REGION }}
  BACKEND_SERVICE: rubiscape-backend
  FRONTEND_BUCKET: ${{ secrets.GCP_PROJECT_ID }}-frontend

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_json: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          export_default_credentials: true

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker

      - name: Build backend Docker image
        run: |
          docker build \
            -t gcr.io/$PROJECT_ID/$BACKEND_SERVICE:latest \
            -t gcr.io/$PROJECT_ID/$BACKEND_SERVICE:${{ github.sha }} \
            ./backend

      - name: Push backend image to Container Registry
        run: |
          docker push gcr.io/$PROJECT_ID/$BACKEND_SERVICE:latest
          docker push gcr.io/$PROJECT_ID/$BACKEND_SERVICE:${{ github.sha }}

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy $BACKEND_SERVICE \
            --image=gcr.io/$PROJECT_ID/$BACKEND_SERVICE:latest \
            --platform=managed \
            --region=$REGION \
            --allow-unauthenticated \
            --port=8000 \
            --memory=512Mi \
            --cpu=1 \
            --timeout=3600 \
            --set-env-vars="DATABASE_URL=postgresql+asyncpg://postgres:${{ secrets.DB_PASSWORD }}@${{ secrets.DATABASE_IP }}:5432/rubiscape_ml,SECRET_KEY=${{ secrets.SECRET_KEY }},ENVIRONMENT=production"

      - name: Get backend URL
        id: backend_url
        run: |
          BACKEND_URL=$(gcloud run services describe $BACKEND_SERVICE \
            --region=$REGION --format='value(status.url)')
          echo "backend_url=$BACKEND_URL" >> $GITHUB_OUTPUT
          echo "Backend deployed to: $BACKEND_URL"

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Build frontend
        run: |
          cd frontend
          npm install
          REACT_APP_API_URL=${{ steps.backend_url.outputs.backend_url }}/api/v1 npm run build

      - name: Deploy frontend to Cloud Storage
        run: |
          gsutil -m cp -r frontend/build/* gs://$FRONTEND_BUCKET/
          gsutil web set -m index.html -e index.html gs://$FRONTEND_BUCKET

      - name: Make frontend public
        run: |
          gsutil iam ch allUsers:objectViewer gs://$FRONTEND_BUCKET

      - name: Deployment Summary
        run: |
          echo "✅ Deployment Completed!"
          echo "Frontend: https://storage.googleapis.com/$FRONTEND_BUCKET/index.html"
          echo "Backend: ${{ steps.backend_url.outputs.backend_url }}"
