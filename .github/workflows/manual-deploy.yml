name: Manual Deploy to GCP

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.REGION }}
  BACKEND_SERVICE: rubiscape-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_json: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          export_default_credentials: true

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker

      - name: Build and push backend image
        run: |
          docker build \
            -t gcr.io/$PROJECT_ID/$BACKEND_SERVICE:${{ github.event.inputs.environment }}-latest \
            -t gcr.io/$PROJECT_ID/$BACKEND_SERVICE:${{ github.event.inputs.environment }}-${{ github.sha }} \
            ./backend
          docker push gcr.io/$PROJECT_ID/$BACKEND_SERVICE:${{ github.event.inputs.environment }}-latest
          docker push gcr.io/$PROJECT_ID/$BACKEND_SERVICE:${{ github.event.inputs.environment }}-${{ github.sha }}

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy $BACKEND_SERVICE \
            --image=gcr.io/$PROJECT_ID/$BACKEND_SERVICE:${{ github.event.inputs.environment }}-latest \
            --platform=managed \
            --region=$REGION \
            --allow-unauthenticated \
            --port=8000 \
            --memory=512Mi \
            --set-env-vars="DATABASE_URL=postgresql+asyncpg://postgres:${{ secrets.DB_PASSWORD }}@${{ secrets.DATABASE_IP }}:5432/rubiscape_ml,SECRET_KEY=${{ secrets.SECRET_KEY }},ENVIRONMENT=${{ github.event.inputs.environment }}"

      - name: Get backend URL
        id: backend_url
        run: |
          BACKEND_URL=$(gcloud run services describe $BACKEND_SERVICE \
            --region=$REGION --format='value(status.url)')
          echo "backend_url=$BACKEND_URL" >> $GITHUB_OUTPUT

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Build and deploy frontend
        run: |
          cd frontend
          npm install
          REACT_APP_API_URL=${{ steps.backend_url.outputs.backend_url }}/api/v1 npm run build
          gsutil -m cp -r build/* gs://${{ env.PROJECT_ID }}-frontend/

      - name: Create deployment summary
        run: |
          cat > deployment-summary.txt << EOF
          ✅ Deployment Successful!
          Environment: ${{ github.event.inputs.environment }}
          Commit: ${{ github.sha }}
          Author: ${{ github.actor }}
          Backend: ${{ steps.backend_url.outputs.backend_url }}
          Frontend: https://storage.googleapis.com/${{ env.PROJECT_ID }}-frontend/index.html
          EOF
          cat deployment-summary.txt

      - name: Post deployment summary to GitHub
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Deployment completed to ${{ github.event.inputs.environment }}!\nBackend: ${{ steps.backend_url.outputs.backend_url }}'
            })
        if: github.event_name == 'pull_request'
